name: Update scanner data

on:
  workflow_dispatch:        # manual + cron-job.org trigger (reliable)
  schedule:
    - cron: "50 3,7,11 * * 1-5" # 09:20, 13:20, 17:20 IST (backup; cron-job.org primary)

permissions:
  contents: write

concurrency:
  group: scanner
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py

      - name: Commit data.json
        run: |
          git config user.name "scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
